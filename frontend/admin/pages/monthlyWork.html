<section id="monthlyWorkPage" class="mw-page" dir="rtl">
  <style>
    .mw-page {
      padding: 18px;
      color: #e5e7eb;
    }

    .mw-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .mw-title h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      color: #f8fafc;
    }

    .mw-title p {
      margin: 7px 0 0;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 700;
    }

    .mw-card {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(2, 6, 23, 0.24);
    }

    .mw-filters {
      padding: 16px;
      margin-bottom: 16px;
    }

    .mw-filter-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
    }

    .mw-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .mw-field label {
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 900;
    }

    .mw-field select {
      width: 100%;
      min-height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(2, 6, 23, 0.62);
      color: #f8fafc;
      padding: 0 12px;
      outline: none;
      font-weight: 800;
    }

    .mw-field select:focus {
      border-color: rgba(59, 130, 246, 0.7);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
    }

    .mw-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .mw-btn {
      min-height: 42px;
      border: 0;
      border-radius: 14px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      transition: 0.18s ease;
    }

    .mw-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .mw-btn:disabled {
      opacity: 0.52;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(0.4);
    }

    .mw-btn-soft {
      background: rgba(30, 41, 59, 0.9);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.18);
    }
.mw-btn-success {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: white;
}

.mw-btn-danger {
  background: linear-gradient(135deg, #dc2626, #f97316);
  color: white;
}
    .mw-alert {
      display: none;
      margin-bottom: 16px;
      padding: 13px 15px;
      border-radius: 16px;
      font-weight: 800;
      line-height: 1.8;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(30, 41, 59, 0.78);
      color: #cbd5e1;
    }

    .mw-alert.show {
      display: block;
    }

    .mw-alert.error {
      background: rgba(127, 29, 29, 0.28);
      border-color: rgba(248, 113, 113, 0.28);
      color: #fecaca;
    }

    .mw-alert.success {
      background: rgba(20, 83, 45, 0.26);
      border-color: rgba(74, 222, 128, 0.28);
      color: #bbf7d0;
    }

    .mw-summary {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .mw-stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .mw-stat span {
      display: block;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .mw-stat strong {
      display: block;
      color: #f8fafc;
      font-size: 23px;
      font-weight: 950;
    }

    .mw-info {
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }

    .mw-info.show {
      display: block;
    }

    .mw-info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
    }

    .mw-info-item {
      padding: 12px;
      border-radius: 16px;
      background: rgba(2, 6, 23, 0.34);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .mw-info-item span {
      display: block;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .mw-info-item strong {
      color: #f8fafc;
      font-size: 13px;
      font-weight: 900;
    }

    .mw-table-card {
      overflow: hidden;
      display: none;
    }

    .mw-table-card.show {
      display: block;
    }

    .mw-table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .mw-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    .mw-table th {
      background: rgba(2, 6, 23, 0.58);
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 950;
      text-align: right;
      padding: 13px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      white-space: nowrap;
    }

    .mw-table td {
      padding: 13px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 800;
      vertical-align: middle;
    }

    .mw-table tr:hover td {
      background: rgba(59, 130, 246, 0.06);
    }

    .mw-student-name {
      color: #f8fafc;
      font-weight: 950;
    }

    .mw-muted {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 800;
    }

    .mw-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .mw-badge-recorded {
      color: #bbf7d0;
      background: rgba(22, 163, 74, 0.16);
      border-color: rgba(34, 197, 94, 0.24);
    }

    .mw-badge-excused {
      color: #bfdbfe;
      background: rgba(37, 99, 235, 0.16);
      border-color: rgba(96, 165, 250, 0.24);
    }

    .mw-badge-absent {
      color: #fed7aa;
      background: rgba(234, 88, 12, 0.16);
      border-color: rgba(251, 146, 60, 0.24);
    }

    .mw-badge-missing {
      color: #fecaca;
      background: rgba(220, 38, 38, 0.16);
      border-color: rgba(248, 113, 113, 0.24);
    }

    .mw-badge-published {
      color: #bbf7d0;
      background: rgba(22, 163, 74, 0.14);
      border-color: rgba(34, 197, 94, 0.2);
    }

    .mw-badge-unpublished {
      color: #fde68a;
      background: rgba(202, 138, 4, 0.16);
      border-color: rgba(250, 204, 21, 0.24);
    }

    .mw-badge-neutral {
      color: #cbd5e1;
      background: rgba(71, 85, 105, 0.2);
      border-color: rgba(148, 163, 184, 0.18);
    }

    .mw-empty {
      padding: 28px;
      text-align: center;
      color: #94a3b8;
      font-weight: 900;
      line-height: 1.9;
    }

   .mw-score {
  color: #f8fafc;
  font-weight: 950;
  direction: ltr;
  unicode-bidi: isolate;
  text-align: center;
}

    @media (max-width: 1100px) {
      .mw-filter-grid,
      .mw-info-grid {
        grid-template-columns: repeat(2, minmax(160px, 1fr));
      }

      .mw-summary {
        grid-template-columns: repeat(3, minmax(120px, 1fr));
      }
    }

    @media (max-width: 640px) {
      .mw-filter-grid,
      .mw-info-grid,
      .mw-summary {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body * {
        visibility: hidden !important;
      }

      #monthlyWorkPage,
      #monthlyWorkPage * {
        visibility: visible !important;
      }

      #monthlyWorkPage {
        position: absolute;
        inset: 0;
        background: white !important;
        color: black !important;
      }

      .mw-actions,
      .mw-filters,
      .mw-alert {
        display: none !important;
      }

      .mw-card,
      .mw-stat,
      .mw-info-item {
        background: white !important;
        color: black !important;
        border-color: #ddd !important;
        box-shadow: none !important;
      }

      .mw-title h2,
      .mw-table td,
      .mw-table th,
      .mw-info-item strong,
      .mw-stat strong {
        color: black !important;
      }
    }
  </style>

  <div class="mw-header">
    <div class="mw-title">
      <h2>الأعمال الشهرية</h2>
      <p>مراجعة الاختبارات الشهرية حسب المادة والشعبة وربطها بالدرجات والحضور والأعذار المعتمدة.</p>
    </div>
  </div>

  <div class="mw-card mw-filters">
    <div class="mw-filter-grid">
      <div class="mw-field">
        <label>السنة الدراسية</label>
        <select id="mwAcademicYear"></select>
      </div>

      <div class="mw-field">
        <label>الفصل الدراسي</label>
        <select id="mwTerm">
          <option value="">اختر الفصل</option>
          <option value="1">الفصل الأول</option>
          <option value="2">الفصل الثاني</option>
        </select>
      </div>

      <div class="mw-field">
        <label>المرحلة</label>
        <select id="mwStage"></select>
      </div>

      <div class="mw-field">
        <label>الصف</label>
        <select id="mwGrade"></select>
      </div>

      <div class="mw-field">
        <label>الشعبة</label>
        <select id="mwSection"></select>
      </div>

      <div class="mw-field">
        <label>المادة</label>
        <select id="mwSubject"></select>
      </div>

      <div class="mw-field">
        <label>الاختبار الشهري</label>
        <select id="mwAssessment"></select>
      </div>
    </div>

    <div class="mw-actions">
      <button type="button" class="mw-btn mw-btn-soft" id="mwLoadAssessmentsBtn">
        <i class="ri-refresh-line"></i>
        تحميل الاختبارات
      </button>

      <button type="button" class="mw-btn" id="mwShowBtn">
        <i class="ri-eye-line"></i>
        عرض الكشف
      </button>

      <button type="button" class="mw-btn mw-btn-soft" id="mwPrintBtn" disabled>
        <i class="ri-printer-line"></i>
        طباعة
      </button>
      <button type="button" class="mw-btn mw-btn-success" id="mwApproveBtn" disabled>
  <i class="ri-checkbox-circle-line"></i>
  اعتماد الكشف الشهري
</button>

<button type="button" class="mw-btn mw-btn-danger" id="mwReturnBtn" disabled>
  <i class="ri-arrow-go-back-line"></i>
  إرجاع للمعلم
</button>
    </div>
  </div>

  <div id="mwAlert" class="mw-alert"></div>

  <div class="mw-summary">
    <div class="mw-stat">
      <span>عدد الطلاب</span>
      <strong id="mwTotalStudents">0</strong>
    </div>

    <div class="mw-stat">
      <span>مرصود</span>
      <strong id="mwRecorded">0</strong>
    </div>

    <div class="mw-stat">
      <span>معذور</span>
      <strong id="mwExcused">0</strong>
    </div>

    <div class="mw-stat">
      <span>غائب</span>
      <strong id="mwAbsent">0</strong>
    </div>

    <div class="mw-stat">
      <span>ناقص</span>
      <strong id="mwMissing">0</strong>
    </div>

    <div class="mw-stat">
      <span>غير منشور</span>
      <strong id="mwUnpublished">0</strong>
    </div>
  </div>

  <div id="mwExamInfo" class="mw-card mw-info"></div>

  <div id="mwTableCard" class="mw-card mw-table-card">
    <div class="mw-table-wrap">
      <table class="mw-table">
        <thead>
          <tr>
            <th>م</th>
            <th>الطالب</th>
            <th>كود الطالب</th>
            <th>رقم القيد</th>
            <th>الدرجة</th>
            <th>حالة الحضور</th>
            <th>العذر</th>
            <th>حالة الطالب</th>
            <th>النشر</th>
            <th>ملاحظة</th>
          </tr>
        </thead>
        <tbody id="mwTableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="mwEmpty" class="mw-card mw-empty">
    اختر الفلاتر ثم اضغط تحميل الاختبارات الشهرية.
  </div>
</section>
